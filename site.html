<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشمي | لوحة التحكم السرية</title>
    <style>
        :root {
            --neon-red: #ff0000;
            --dark-overlay: rgba(0, 0, 0, 0.75);
        }

        body {
            /* تم تعديل المسار هنا ليصبح متوافقاً مع الاستضافة (الخطوة رقم 2) */
            background-image: linear-gradient(var(--dark-overlay), var(--dark-overlay)), 
                              url('na.jpeg'); 
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-box {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(15px);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--neon-red);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 380px;
            border-radius: 12px;
            text-align: center;
        }

        h2 { color: var(--neon-red); text-shadow: 0 0 10px rgba(255, 0, 0, 0.3); font-weight: bold; }
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #bbb; }
        
        input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: #fff;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon-red); box-shadow: 0 0 5px var(--neon-red); }

        button {
            background: var(--neon-red);
            color: #fff;
            border: none;
            width: 100%;
            padding: 14px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            text-transform: uppercase;
            font-size: 1rem;
            margin-top: 10px;
        }

        button:hover { background: #cc0000; }
        .hidden-panel { display: none; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-box">
        <h2>نظام الدخول الآمن</h2>
        <div class="input-group">
            <label> USR </label>
            <input type="text" id="user" placeholder="Username">
        </div>
        <div class="input-group">
            <label> PASSWORD </label>
            <input type="password" id="pass" placeholder="Password">
        </div>
        <button id="loginBtn" onclick="checkAuth()"> LOGIN </button>
    </div>

    <div id="adminPanel" class="login-box hidden-panel">
        <h3 style="color: var(--neon-red); margin-bottom: 20px;">لوحة إدارة نشمي</h3>
        <div class="input-group">
            <label>تحديث مفتاح Gemini API</label>
            <input type="text" id="newKey" placeholder="Paste your key here...">
        </div>
        <button onclick="saveAndRedirect()">تحديث وتشغيل الموقع</button>
    </div>

    <script>
        async function sendNotification(username, status) {
            const webhookURL = "https://discord.com/api/webhooks/1485672264576925776/MUbG8iigKvUc2mi-NDFi1uWgXVuyHW7cHa-Juks6DC-0NIVDSj4S0Ftfh1RIdm8lKkZ8";

            const data = {
                username: "Nshmi Watchdog",
                embeds: [{
                    title: status === "Success" ? "✅ دخول ناجح للنظام" : "⚠️ محاولة دخول فاشلة",
                    color: status === "Success" ? 3066993 : 15158332,
                    fields: [
                        { name: "المستخدم", value: username || "فراغ", inline: true },
                        { name: "الحالة", value: status, inline: true },
                        { name: "التوقيت", value: new Date().toLocaleString('ar-JO') }
                    ],
                    footer: { text: "نظام مراقبة نشمي المركزي" }
                }]
            };

            try {
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (e) { console.error("Webhook Error"); }
        }

        function checkAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            const users = {
                'root': 'root',
                'admin': 'admin'
            };

            if (users[u] && users[u] === p) {
                sendNotification(u, "Success");
                document.cookie = "auth_session=granted; path=/; samesite=strict";
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                localStorage.setItem('IS_ADMIN', 'true');
            } else {
                sendNotification(u, "Failed Attempt");
                alert("Error: Unauthorized Access");
            }
        }

        function saveAndRedirect() {
            const key = document.getElementById('newKey').value;
            if (key.length > 10) {
                localStorage.setItem('ADMIN_GEMINI_KEY', key);
                window.location.href = 'index.html'; 
            }
        }
    </script>
</body>
</html>
